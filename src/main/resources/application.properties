spring.application.name=learning-resource-system

# 数据库连接配置
spring.datasource.url=jdbc:mysql://localhost:3306/learning_resource_system?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA配置
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Thymeleaf配置
spring.thymeleaf.cache=false
spring.thymeleaf.mode=HTML

# 服务器配置
server.port=8080
server.servlet.context-path=/

# 日志配置
logging.level.org.springframework=info

